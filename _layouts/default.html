<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  {% include head.html %}

    <!-- ✅ PWA Data (untuk JavaScript) -->
‎  <meta name="pwa-title" content="{{ site.title }}">
‎  <meta name="pwa-description" content="{{ site.description }}">
‎  <meta name="pwa-icon" content="{{ '/assets/images/icons/icon-192x192.png' | relative_url }}">
‎  <meta name="pwa-baseurl" content="{{ site.baseurl }}">

</head>
  
<body data-site-title="{{ site.title }}" data-site-url="{{ site.url }}">
  {% include header.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include fab.html %}

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <img src="" alt="" id="lightboxImg">
  </div>

<!-- === Cache-Busting untuk Assets === -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}">
<script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}" defer></script>
</body>
</html>
