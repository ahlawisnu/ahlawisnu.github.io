# === Site Identity ===  
title: "AI Art Gallery"
description: "Koleksi prompt & karya AI Art — Eksplorasi visual tanpa batas."
url: "https://ahlawisnu.github.io"       # Ganti dengan URL GitHub Pages kamu
baseurl: ""            # Ganti dengan nama repo kamu
author: "AWVR VERSE"
email: "wisnudiary@outlook.com"
lang: id-ID
timezone: Asia/Jakarta

# === Build Settings ===  
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
permalink: /:categories/:title/

# === Sass ===  
sass:
  sass_dir: _sass
  style: compressed

# === Plugins (GitHub Pages compatible) ===  
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist

# === Pagination ===  
paginate: 12
paginate_path: "/page/:num/"

# === SEO ===  
twitter:
  username: 
  card: summary_large_image

social:
  name: AWVR VERSE
  links:
    - https://twitter.com/UnknownDATA__
    - https://github.com/ahlawisnu
    - https://instagram.com/awvr.verse

# === Exclude ===  
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache/
  - .jekyll-cache/

  # Di dalam _config.yml
image: "/assets/images/default.png"
