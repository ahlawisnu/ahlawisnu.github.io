<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- === Dynamic Title === -->
{% if page.layout == 'home' or page.url == '/' %}
  <!-- Homepage: hanya nama blog -->
  <title>{{ site.title }}</title>
{% elsif page.title %}
  <!-- Post/Page/Kategori: Judul | Nama Blog -->
  <title>{{ page.title }} | {{ site.title }}</title>
{% else %}
  <!-- Fallback -->
  <title>{{ site.title }} — {{ site.description }}</title>
{% endif %}

<meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
<meta name="author" content="{{ site.author }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Theme color -->
<meta name="theme-color" content="￼#6750A4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="￼#141218" media="(prefers-color-scheme: dark)">
<meta name="google-site-verification" content="iOuGzpAPtvKUQRZ90phhagHaA2cyiRsbSogUjl6V1pw" />
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

<!-- === Cache Control === -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- === Cache-Busting untuk Assets === -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}">
<script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}" defer></script>

<!-- Menentukan variabel fallback image -->
{% assign meta_image = page.image | default: site.image %}

<!-- Open Graph -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 200 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="{{ site.lang | default: 'id_ID' }}">
