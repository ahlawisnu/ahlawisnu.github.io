<header class="site-header">
  <nav class="container navbar" aria-label="Main navigation">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand-logo">AI</span>
      <span>{{ site.title }}</span>
    </a>

    <!-- ✅ Wrapper untuk tombol aksi (selalu terlihat) -->
    <div class="header-actions">
      <button class="theme-toggle" aria-label="Toggle theme" id="themeToggle">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Nav links (drawer di mobile) -->
    <ul class="nav-links">
      {% for item in site.data.navigation.main %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}class="active" aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </nav>
</header>
