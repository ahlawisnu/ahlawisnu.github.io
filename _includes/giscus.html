<div class="comments-section">
  <h3 style="margin-bottom: 24px;">💬 Diskusi</h3>

  <!-- Loading skeleton -->
  <div id="giscus-loading" class="giscus-skeleton">
    <div class="skeleton" style="height: 20px; width: 40%; border-radius: 4px; margin-bottom: 16px;"></div>
    <div class="skeleton" style="height: 80px; width: 100%; border-radius: 12px; margin-bottom: 12px;"></div>
    <div class="skeleton" style="height: 40px; width: 100%; border-radius: 12px;"></div>
  </div>

  <div id="giscus-container"></div>
</div>

<script>
  // === Giscus: Load dengan tema dinamis ===
  (function() {
    // Baca tema saat ini (dari localStorage atau system preference)
    function getCurrentTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    // Map tema app → tema Giscus
    function getGiscusTheme(appTheme) {
      return appTheme === 'dark' ? 'dark_dimmed' : 'light';
    }

    const currentTheme = getCurrentTheme();
    const giscusTheme = getGiscusTheme(currentTheme);

    // Simpan tema saat ini di window untuk diakses dari main.js
    window.__giscusTheme = giscusTheme;

    // Buat script Giscus
    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'ahlawisnu/ahlawisnu.github.io');        // ← Ganti!
    script.setAttribute('data-repo-id', 'R_kgDOTMGZRg');            // ← Ganti!
    script.setAttribute('data-category', 'General');     // ← Ganti!
    script.setAttribute('data-category-id', 'DIC_kwDOTMGZRs4DAZY5');    // ← Ganti!
    script.setAttribute('data-mapping', 'pathname');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '1');            // ✅ PENTING: Enable metadata emission
    script.setAttribute('data-input-position', 'top');
    script.setAttribute('data-theme', giscusTheme);
    script.setAttribute('data-lang', 'id');
    script.setAttribute('crossorigin', 'anonymous');
    script.async = true;

    // Hapus loading skeleton setelah Giscus loaded
    script.addEventListener('load', function() {
      // Tunggu iframe muncul
      const checkIframe = setInterval(function() {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
          clearInterval(checkIframe);
          // Sembunyikan skeleton
          const loader = document.getElementById('giscus-loading');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
          }
          // Tandai iframe sudah ready
          window.__giscusReady = true;
          console.log('[Giscus] Iframe ready, theme:', giscusTheme);
        }
      }, 100);

      // Timeout: stop checking setelah 10 detik
      setTimeout(() => clearInterval(checkIframe), 10000);
    });

    document.getElementById('giscus-container').appendChild(script);
  })();
</script>
