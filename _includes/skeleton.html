<div class="gallery-grid" id="skeletonGrid">
  {% for i in (1..8) %}
    <div class="art-card">
      <div class="art-card-image skeleton" style="aspect-ratio: 1/1;"></div>
      <div class="art-card-body">
        <div class="skeleton" style="height: 20px; width: 80%; border-radius: 4px; margin-bottom: 8px;"></div>
        <div class="skeleton" style="height: 14px; width: 50%; border-radius: 4px;"></div>
      </div>
    </div>
  {% endfor %}
</div>
